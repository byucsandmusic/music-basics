name: Pull Request

on:
    pull_request:
        branches:
            - prd
            - dev

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install Dependencies
              run: npm ci

            - name: Run Tests
              run: npm test

    prettier:
        name: Run Prettier Checkstyle
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install Depenencies
              run: npm ci

            - name: Run Prettier
              run: npx prettier --check .
