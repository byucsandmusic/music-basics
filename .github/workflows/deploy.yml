name: Deploy Vite/Vue to GitHub Pages

on:
    push:
        branches:
            - prd
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install dependencies
          run: npm install

        - name: Build Project
          run: npm run build

    deploy:
        needs: build
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
